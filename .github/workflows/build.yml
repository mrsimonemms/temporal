name: Build
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
  packages: write
  pull-requests: read
jobs:
  commitlint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch-depth is required

      - uses: wagoid/commitlint-github-action@v6

  list_components:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      matrix-nodocker: ${{ steps.list.outputs.matrix-nodocker }}
    steps:
      - uses: actions/checkout@v4

      - name: List components to build Docker images
        id: list
        run: |
          touch /tmp/output.yaml
          touch /tmp/output-nodocker.yaml
          for pkg in $(find components/ -maxdepth 1 -type d -and -not -name "components"); do
            no_dir="${pkg/components\//}"
            echo "- ${no_dir}" >> /tmp/output.yaml
            if [ ! -f "${pkg}/.nodockerbuild" ]; then
              echo "- ${no_dir}" >> /tmp/output-nodocker.yaml
            fi
          done
          echo "matrix={\"component\":$(cat /tmp/output.yaml | yq -o json -I 0)}" >> "$GITHUB_OUTPUT"
          echo "matrix-nodocker={\"component\":$(cat /tmp/output-nodocker.yaml | yq -o json -I 0)}" >> "$GITHUB_OUTPUT"

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch-depth is required

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Set up JS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          go install ./... || true
          npm ci || true

      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    needs:
      - list_components
    defaults:
      run:
        working-directory: ./components/${{ matrix.component }}
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.list_components.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect component language
        id: lang
        run: |
          if [ -f "./main.go" ]; then
            echo "lang=go" >> "$GITHUB_OUTPUT"
          elif [ -f "./package.json" ]; then
            echo "lang=js" >> "$GITHUB_OUTPUT"
          fi

      # Golang checks
      - name: "Go: Set up"
        if: steps.lang.outputs.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: "Go: Run tests"
        if: steps.lang.outputs.lang == 'go'
        run: go vet -v ./...

      - name: "Go: Run tests"
        if: steps.lang.outputs.lang == 'go'
        run: go test -v ./...

      # JS checks
      - name: "JS: Setup"
        if: steps.lang.outputs.lang == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: "JS: Install and test"
        if: steps.lang.outputs.lang == 'js'
        run: |
          npm ci
          npm run lint
          npm test

  build:
    runs-on: ubuntu-latest
    needs:
      - list_components
      - test
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.list_components.outputs.matrix-nodocker) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch names
        id: branch-name
        uses: tj-actions/branch-names@v8
        with:
          strip_tag_prefix: v

      - name: Generate Docker tag
        id: docker
        run: |
          if [ "${{ steps.branch-name.outputs.is_tag }}" = "true"  ];
          then
            # Latest tag
            IMG_NAME="ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}:latest"
            # Tag name (usually vX.Y.Z)
            IMG_NAME="${IMG_NAME},ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}:${{ steps.branch-name.outputs.tag }}"

            echo "image_name=${IMG_NAME}" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            # Use branch naming convention
            TAG="branch-${{ steps.branch-name.outputs.current_branch }}"
            # Change "/" for "-"
            TAG="${TAG//\//-}"
            # Set to lowercase
            TAG="${TAG,,}"

            echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}:${TAG}" >> "$GITHUB_OUTPUT"
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "push=${{ github.ref == 'refs/heads/main' }}" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ steps.branch-name.outputs.is_tag }}" = "true"  ];
          then
            echo "version=${{ steps.branch-name.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=development" >> "$GITHUB_OUTPUT"
          fi

          DOCKER_CONTEXT="."
          DOCKERFILE="./components/go.Dockerfile"
          if [ -f "./components/${{ matrix.component }}/Dockerfile" ]; then
            DOCKER_CONTEXT="./components/${{ matrix.component }}"
            DOCKERFILE="./components/${{ matrix.component }}/Dockerfile"
          fi

          echo "container_tagged_image=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_id=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "gitRepo=github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "docker_context=${DOCKER_CONTEXT}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          build-args: |
            COMPONENT=${{ matrix.component }}
            GIT_COMMIT=${{ steps.docker.outputs.commit_id }}
            GIT_REPO=${{ steps.docker.outputs.gitRepo }}
            VERSION=${{ steps.docker.outputs.version }}
          context:  ${{ steps.docker.outputs.docker_context }}
          file: ${{ steps.docker.outputs.dockerfile }}
          platforms: ${{ steps.docker.outputs.platforms }}
          push: ${{ steps.docker.outputs.push }}
          tags: ${{ steps.docker.outputs.image_name }},${{ steps.docker.outputs.container_tagged_image }}

  e2e_control-plane:
    runs-on: ubuntu-latest
    env:
      TEMPORAL_ADDRESS: 127.0.0.1:7233
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: "JS: Setup"
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Temporal CLI
        uses: temporalio/setup-temporal@v0

      - name: Start a local Temporal server
        run: temporal server start-dev --headless &

      - name: "JS: Install and test"
        working-directory: ./components/control-plane
        run: |
          npm ci
          npm run test:e2e
